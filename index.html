<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & Share preview -->
    <meta name="description" content="Command Center — The all-in-one dashboard for engineering students. Track attendance, LeetCode progress, placement tasks, fitness, and diet. Powered by AI." />
    <meta name="keywords" content="placement dashboard, engineering student, PEC, LeetCode tracker, attendance manager, AI study plan, Gemini AI" />
    <meta name="author" content="CmdCenter PEC Edition" />

    <!-- Open Graph (WhatsApp, LinkedIn previews) -->
    <meta property="og:title" content="Command Center — PEC Edition" />
    <meta property="og:description" content="Your all-in-one engineering dashboard. LeetCode live stats, AI study plans, attendance calendar, fitness & diet tracker." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <meta name="twitter:description" content="AI-powered dashboard for engineering students." />

    <!-- PWA -->
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon — proper SVG -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
